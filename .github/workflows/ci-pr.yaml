name: CI Checks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    paths:
      - "src/**"
      - "benchmarks/**"
      - "profiles/**"
      - "docker/**"
      - ".github/workflows/ci-pr.yaml"

jobs:
  evals-checks:
    name: Lint, type check & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test --coverage

      - name: Format check
        run: bun run format:check

      - name: Unused code check
        run: bun run lint:unused

  go-runtime-checks:
    name: Go vellum-evals-runtime (gofmt, vet, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/eval-pod/vellum-evals-runtime

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: docker/eval-pod/vellum-evals-runtime/go.mod

      - name: Format check (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt produced changes — run 'gofmt -w .' on these files:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race + count=1)
        run: go test -race -count=1 ./...

      - name: Build (static, stripped)
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/vellum-evals-runtime ./

  python-egress-checks:
    name: Python egress sidecars (unittest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test recording usage parser
        working-directory: src/lib/egress/recording
        run: python3 -m unittest discover -p 'test_*.py' -v

      - name: Test connection telemetry tailer
        working-directory: src/lib/egress/connection-telemetry
        run: python3 -m unittest discover -p 'test_*.py' -v
