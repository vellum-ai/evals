name: Publish eval-pod image

on:
  schedule:
    # Every hour on the hour.
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: eval-pod-publish
  cancel-in-progress: true

jobs:
  # ── Skip-if-idle gate ─────────────────────────────────────────────────
  # The hourly schedule fires regardless of repo activity. Rebuilding an
  # unchanged main HEAD wastes CI minutes and republishes a byte-identical
  # image, so cancel the run when nothing has landed since the last
  # *successful* publish. "Successful" is keyed off the build-and-push job
  # conclusion of this workflow's prior runs (mirrors dev-release, which keys
  # off its register-release job). Manual workflow_dispatch always proceeds.
  check-for-new-commits:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
      # "true" only when rebuilding an unchanged main HEAD purely to refresh
      # floating upstream deps (the daily-refresh path). The build job uses this
      # to move `latest` WITHOUT republishing the immutable :<sha> tag.
      refresh_only: ${{ steps.check.outputs.refresh_only }}
    steps:
      - name: Check for new commits since last successful publish
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Find the last successful publish: its head SHA and when it ran. Walk
          # this workflow's completed main runs newest-first and pick the first
          # whose build-and-push job succeeded. Page through all results with
          # --paginate (instead of capping at a single 30-item page) and break as
          # soon as we find one, so a long run of idle-skipped runs can never push
          # the last successful build past the lookup window and cause a spurious
          # "no previous publish" rebuild. Done for every trigger (including
          # workflow_dispatch) so we can tell whether THIS commit was already
          # published and avoid re-stamping its immutable :<sha> tag below.
          PREV_SHA=""
          PREV_TS=""
          while read -r rid rsha rts; do
            [ -z "$rid" ] && continue
            # Tolerate a transient per-run jobs-API failure (5xx, rate-limit, or a
            # 404 for a pruned run): `|| true` keeps `set -e` from killing the
            # whole gate over one bad lookup — CONCL just stays empty and we move
            # on to the next run rather than dropping this hour's publish.
            CONCL=$(gh api "repos/${REPO}/actions/runs/${rid}/jobs" \
              --jq '[.jobs[] | select(.name == "build-and-push") | .conclusion] | .[0] // empty' 2>/dev/null || true)
            if [ "$CONCL" = "success" ]; then
              PREV_SHA="$rsha"
              PREV_TS="$rts"
              break
            fi
          done < <(gh api --paginate \
            "repos/${REPO}/actions/workflows/eval-pod-publish.yaml/runs?branch=main&status=completed&per_page=100&exclude_pull_requests=true" \
            --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | \"\(.id) \(.head_sha) \(.run_started_at)\"")

          echo "Last successful publish SHA: ${PREV_SHA:-<none>} (run started ${PREV_TS:-<none>})"
          echo "Current SHA: ${HEAD_SHA} (event: ${EVENT_NAME})"

          # This commit has never been published — build it and stamp its
          # immutable :<sha> tag (content build, refresh_only=false). Covers the
          # first-ever run, a new commit on main, and a workflow_dispatch from a
          # not-yet-published ref.
          if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" != "$HEAD_SHA" ]; then
            echo "Commit not yet published — proceeding with a content build."
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            echo "refresh_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # This exact commit was already published. Unlike dev-release's images
          # (pure functions of the repo source), the eval-pod image is NOT
          # reproducible from the SHA alone: it installs @vellumai/cli@latest at
          # build time and resolves plugins from upstream live. So a rebuild of an
          # already-published commit can only *refresh* those floating upstream
          # artifacts — it must move `latest` but must NOT re-stamp the immutable
          # :<sha> tag (that commit's pinned image is already published). Any such
          # rebuild is therefore a refresh_only build.
          #
          # - workflow_dispatch: the operator explicitly asked — refresh now.
          # - scheduled: refresh at most once per MAX_IMAGE_AGE_HOURS so `latest`
          #   tracks @latest within a day, while still skipping the other ~23 idle
          #   hourly runs each day.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch on an already-published commit — refreshing 'latest' (immutable :<sha> left untouched)."
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            echo "refresh_only=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAX_IMAGE_AGE_HOURS=24
          PREV_EPOCH=$(date -u -d "$PREV_TS" +%s)
          NOW_EPOCH=$(date -u +%s)
          AGE_HOURS=$(( (NOW_EPOCH - PREV_EPOCH) / 3600 ))
          echo "Last successful publish was ${AGE_HOURS}h ago (refresh threshold: ${MAX_IMAGE_AGE_HOURS}h)."

          if [ "$AGE_HOURS" -ge "$MAX_IMAGE_AGE_HOURS" ]; then
            echo "Unchanged main HEAD, but the last publish is >= ${MAX_IMAGE_AGE_HOURS}h old — forcing a refresh to pick up @vellumai/cli@latest and live plugins."
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            echo "refresh_only=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No new commits since the last successful publish (${PREV_SHA}) and the image is < ${MAX_IMAGE_AGE_HOURS}h old — cancelling run."
          echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
          gh run cancel "$RUN_ID" --repo "$REPO" \
            || echo "::warning::Failed to cancel run ${RUN_ID}; build-and-push is gated on has_new_commits=false and will be skipped anyway."
          sleep 15

  build-and-push:
    needs: [check-for-new-commits]
    if: ${{ needs.check-for-new-commits.outputs.has_new_commits == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Required: the WIF principal is bound to subject
    # repo:vellum-ai/evals:environment:dev — OIDC is rejected without this.
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/304030683664/locations/global/workloadIdentityPools/github-pool-dev/providers/github-actions-provider-0
          service_account: gha-evals-image-pusher@vellum-nonprod.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        env:
          IMAGE: us-central1-docker.pkg.dev/vellum-nonprod/eval-pod-images/eval-pod
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          REFRESH_ONLY: ${{ needs.check-for-new-commits.outputs.refresh_only }}
        run: |
          set -euo pipefail
          if [ "$REFRESH_ONLY" = "true" ]; then
            # Daily refresh of an unchanged main HEAD, rebuilt only to pick up
            # @vellumai/cli@latest + live plugins. Move `latest`, but do NOT
            # republish the immutable :<sha> tag — that commit's image is already
            # published and the per-commit tag must stay put. (This path is only
            # ever reached on a scheduled main run, so it is always main-ref.)
            TAGS="${IMAGE}:latest"
            SUMMARY="\`latest\` (daily refresh — immutable \`${SHA}\` tag left untouched)"
            echo "::notice::Daily refresh of unchanged ${SHA} — moving 'latest' only; not republishing the immutable per-commit tag."
          else
            # Content build (new commit, first publish, or manual dispatch).
            # Always publish the immutable per-commit tag; only move the floating
            # `latest` for main-ref builds, so a manual workflow_dispatch from a
            # non-main ref can't repoint `latest` at non-main code.
            TAGS="${IMAGE}:${SHA}"
            if [ "$REF" = "refs/heads/main" ]; then
              TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
              SUMMARY="\`${SHA}\`, \`latest\`"
            else
              SUMMARY="\`${SHA}\` (non-main ref — \`latest\` not moved)"
              echo "::notice::Non-main ref (${REF}) — publishing only the immutable ${SHA} tag, not moving 'latest'."
            fi
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
            echo "summary=${SUMMARY}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push eval-pod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/eval-pod/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          # A refresh build exists ONLY to pull newer floating upstream deps
          # (@vellumai/cli@latest + live plugins). Docker layer caching keys on
          # the `RUN ... bun add @vellumai/cli@latest` instruction text, not its
          # resolved result, so reusing the cache would reproduce the byte-
          # identical image and defeat the refresh. `no-cache` bypasses cache
          # import on refresh builds (content builds keep cache-from for speed);
          # cache-to still runs so a refresh repopulates the cache with the newly
          # resolved layers for the next content build.
          no-cache: ${{ needs.check-for-new-commits.outputs.refresh_only == 'true' }}
          cache-from: type=gha,scope=eval-pod
          cache-to: type=gha,mode=max,ignore-error=true,scope=eval-pod

      # ── Eval catalog ──────────────────────────────────────────────────
      # Publish a machine-readable benchmark/profile inventory next to the
      # image so the qa dashboard's eval-trigger panel reads what THIS build
      # actually ships instead of hardcoding a drifted list. These steps sit
      # AFTER the image push on purpose: the push has already succeeded, so a
      # catalog failure fails the run visibly but can never un-publish the
      # image. Accordingly there is no failure suppression anywhere below —
      # no continue-on-error, no `|| true`.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Generate eval catalog
        env:
          GIT_SHA: ${{ github.sha }}
          # The immutable :<sha> image tag. On refresh_only builds the sha
          # tag is not re-pushed, but this exact commit's pinned image was
          # already published under it, so the value stays correct — the
          # re-upload just refreshes generatedAt/latest.json, mirroring the
          # image `latest` move.
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          bun install
          bun scripts/generate-catalog.ts > catalog.json
          # Guard against an empty/garbage artifact reaching the bucket.
          bun -e 'const c = await Bun.file("catalog.json").json();
            if (!Array.isArray(c.benchmarks) || c.benchmarks.length === 0) throw new Error("catalog has no benchmarks");
            if (!Array.isArray(c.profiles) || c.profiles.length === 0) throw new Error("catalog has no profiles");'
          cat catalog.json

      - name: Upload eval catalog to GCS
        id: catalog
        env:
          # The qa results bucket the dashboard reads. The workflow SA is
          # granted write on the eval-catalog/ prefix via Terraform.
          CATALOG_BUCKET: vellum-nonprod-qa-artifacts
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          REFRESH_ONLY: ${{ needs.check-for-new-commits.outputs.refresh_only }}
        run: |
          set -euo pipefail
          # Per the frozen contract, eval-catalog/<sha>.json is written on
          # every build (idempotent overwrite on refresh).
          gcloud storage cp catalog.json "gs://${CATALOG_BUCKET}/eval-catalog/${SHA}.json" \
            --content-type=application/json
          # latest.json mirrors the `latest` image tag: moved on main-ref
          # content builds and on refresh builds (refresh is main-only).
          if [ "$REFRESH_ONLY" = "true" ] || [ "$REF" = "refs/heads/main" ]; then
            gcloud storage cp catalog.json "gs://${CATALOG_BUCKET}/eval-catalog/latest.json" \
              --content-type=application/json --cache-control=no-cache
            echo "summary=\`eval-catalog/${SHA}.json\`, \`eval-catalog/latest.json\`" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Non-main ref (${REF}) — wrote eval-catalog/${SHA}.json only; latest.json not moved."
            echo "summary=\`eval-catalog/${SHA}.json\` (non-main ref — \`latest.json\` not moved)" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        env:
          TAG_SUMMARY: ${{ steps.tags.outputs.summary }}
          CATALOG_SUMMARY: ${{ steps.catalog.outputs.summary }}
        run: |
          {
            echo "## eval-pod image published"
            echo ""
            echo "**Repo:** \`us-central1-docker.pkg.dev/vellum-nonprod/eval-pod-images/eval-pod\`"
            echo "**Tags:** ${TAG_SUMMARY}"
            echo "**Catalog:** ${CATALOG_SUMMARY}"
          } >> "$GITHUB_STEP_SUMMARY"
