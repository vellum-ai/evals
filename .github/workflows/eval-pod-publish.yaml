name: Publish eval-pod image

on:
  schedule:
    # Every hour on the hour.
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: eval-pod-publish
  cancel-in-progress: true

jobs:
  # ── Skip-if-idle gate ─────────────────────────────────────────────────
  # The hourly schedule fires regardless of repo activity. Rebuilding an
  # unchanged main HEAD wastes CI minutes and republishes a byte-identical
  # image, so cancel the run when nothing has landed since the last
  # *successful* publish. "Successful" is keyed off the build-and-push job
  # conclusion of this workflow's prior runs (mirrors dev-release, which keys
  # off its register-release job). Manual workflow_dispatch always proceeds.
  check-for-new-commits:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
    steps:
      - name: Check for new commits since last successful publish
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Manual dispatches always run, regardless of commit activity.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding regardless of commit activity."
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find the last successful publish: its head SHA and when it ran. Walk
          # this workflow's completed main runs newest-first and pick the first
          # whose build-and-push job succeeded. Page through all results with
          # --paginate (instead of capping at a single 30-item page) and break as
          # soon as we find one, so a long run of idle-skipped runs can never push
          # the last successful build past the lookup window and cause a spurious
          # "no previous publish" rebuild.
          PREV_SHA=""
          PREV_TS=""
          while read -r rid rsha rts; do
            [ -z "$rid" ] && continue
            # Tolerate a transient per-run jobs-API failure (5xx, rate-limit, or a
            # 404 for a pruned run): `|| true` keeps `set -e` from killing the
            # whole gate over one bad lookup — CONCL just stays empty and we move
            # on to the next run rather than dropping this hour's publish.
            CONCL=$(gh api "repos/${REPO}/actions/runs/${rid}/jobs" \
              --jq '[.jobs[] | select(.name == "build-and-push") | .conclusion] | .[0] // empty' 2>/dev/null || true)
            if [ "$CONCL" = "success" ]; then
              PREV_SHA="$rsha"
              PREV_TS="$rts"
              break
            fi
          done < <(gh api --paginate \
            "repos/${REPO}/actions/workflows/eval-pod-publish.yaml/runs?branch=main&status=completed&per_page=100&exclude_pull_requests=true" \
            --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | \"\(.id) \(.head_sha) \(.run_started_at)\"")

          echo "Last successful publish SHA: ${PREV_SHA:-<none>} (run started ${PREV_TS:-<none>})"
          echo "Current SHA: ${HEAD_SHA}"

          if [ -z "$PREV_SHA" ]; then
            echo "No previous successful publish found — proceeding."
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PREV_SHA" != "$HEAD_SHA" ]; then
            echo "New commits detected since the last successful publish — proceeding."
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Same main HEAD as the last successful publish. Unlike dev-release's
          # images (pure functions of the repo source), the eval-pod image is
          # NOT reproducible from the SHA alone: it installs @vellumai/cli@latest
          # at build time and resolves plugins from upstream live. So a byte-for-
          # byte identical main HEAD can still produce a *newer* image when those
          # floating upstream artifacts move. Force a daily refresh: rebuild an
          # unchanged HEAD once the last successful publish is older than
          # MAX_IMAGE_AGE_HOURS, so `latest` tracks @latest within a day, while
          # still skipping the other ~23 idle hourly runs each day.
          MAX_IMAGE_AGE_HOURS=24
          PREV_EPOCH=$(date -u -d "$PREV_TS" +%s)
          NOW_EPOCH=$(date -u +%s)
          AGE_HOURS=$(( (NOW_EPOCH - PREV_EPOCH) / 3600 ))
          echo "Last successful publish was ${AGE_HOURS}h ago (refresh threshold: ${MAX_IMAGE_AGE_HOURS}h)."

          if [ "$AGE_HOURS" -ge "$MAX_IMAGE_AGE_HOURS" ]; then
            echo "Unchanged main HEAD, but the last publish is >= ${MAX_IMAGE_AGE_HOURS}h old — forcing a refresh to pick up @vellumai/cli@latest and live plugins."
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No new commits since the last successful publish (${PREV_SHA}) and the image is < ${MAX_IMAGE_AGE_HOURS}h old — cancelling run."
          echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
          gh run cancel "$RUN_ID" --repo "$REPO" \
            || echo "::warning::Failed to cancel run ${RUN_ID}; build-and-push is gated on has_new_commits=false and will be skipped anyway."
          sleep 15

  build-and-push:
    needs: [check-for-new-commits]
    if: ${{ needs.check-for-new-commits.outputs.has_new_commits == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Required: the WIF principal is bound to subject
    # repo:vellum-ai/evals:environment:dev — OIDC is rejected without this.
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/304030683664/locations/global/workloadIdentityPools/github-pool-dev/providers/github-actions-provider-0
          service_account: gha-evals-image-pusher@vellum-nonprod.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        env:
          IMAGE: us-central1-docker.pkg.dev/vellum-nonprod/eval-pod-images/eval-pod
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Always publish the immutable per-commit tag.
          TAGS="${IMAGE}:${SHA}"
          # Only move the floating `latest` tag for builds of main HEAD. Scheduled
          # runs always run on the default branch (main), so the happy path still
          # gets `latest`; this only prevents a manual workflow_dispatch from a
          # non-main ref from repointing `latest` at non-main code.
          if [ "$REF" = "refs/heads/main" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
            echo "latest_pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Non-main ref (${REF}) — publishing only the immutable ${SHA} tag, not moving 'latest'."
            echo "latest_pushed=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push eval-pod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/eval-pod/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=eval-pod
          cache-to: type=gha,mode=max,ignore-error=true,scope=eval-pod

      - name: Summary
        env:
          LATEST_PUSHED: ${{ steps.tags.outputs.latest_pushed }}
        run: |
          {
            echo "## eval-pod image published"
            echo ""
            echo "**Repo:** \`us-central1-docker.pkg.dev/vellum-nonprod/eval-pod-images/eval-pod\`"
            if [ "$LATEST_PUSHED" = "true" ]; then
              echo "**Tags:** \`${GITHUB_SHA}\`, \`latest\`"
            else
              echo "**Tags:** \`${GITHUB_SHA}\` (non-main ref — \`latest\` not moved)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
